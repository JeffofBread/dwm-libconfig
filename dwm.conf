#
# Example/default dwm-libconfig configuration file.
# It is intended to be a near 1:1 replica of the default dwm-6.8 `config.(def.).h`.
#
# For more information, please go to https://github.com/JeffofBread/dwm-libconfig/
#

#
# Warnings:
#	This is named "themes", but that is slightly deceptive. dwm
#	only has the ability to use a single theme by default, so
#	the parser is set to only use the first theme in the list.
#
# The themes are structured as such:
#	1) "fonts": A list of strings containing an XLFD or FreeType fonts. See:
#		- https://wiki.archlinux.org/title/X_Logical_Font_Description
#		- https://dwm.suckless.org/customisation/font/
#
#	2) "normal-foreground", "normal-background", "normal-border",
#	   "selected-foreground", "selected-background", "selected-border":
#	   These all should be strings containing hex color codes, including
#	   the pound/hash symbol (#).
#
themes = (
	{
		fonts = (
			"monospace:size=10"
		);

		normal-foreground = "#bbbbbb";
		normal-background = "#222222";
		normal-border = "#444444";

		selected-foreground = "#eeeeee";
		selected-background = "#005577";
		selected-border = "#005577";
	}
);

#
# Notes:
#	I recommend reading suckless' explanation of the `rules` array.
#	It generally still applies here, just in a config file instead
#	of source code.
#		- https://dwm.suckless.org/customisation/rules/
#		- https://dwm.suckless.org/customisation/tagmask/
#
# The rules are structured as such:
#	1) "class": String containing the SECOND element of WM_CLASS of
#	   the desired client to be effected by this rule.
#
#	2) "instance": String containing the FIRST element of WM_CLASS of
#	    the desired client to be effected by this rule.
#
#	3) "title": String containing _NET_WM_NAME or WM_NAME of
#	    the desired client to be effected by this rule.
#
#	4) "tag-mask": Tag bitmask to move the client to. For example, a
#	   bitmask of '4' (2^3) would move the client to tag 3.
#
#	5) "floating": Floating state of the client. 1 is floating, 0 is tiled.
#
#	6) "monitor": Monitor to move the client to. -1 moves the client to
#	   the currently focused monitor.
#
rules = (
	{
		class = "Gimp";
		instance = "NULL";
		title = "NULL";
		tag-mask = 0;
		floating = 1;
		monitor = -1;
	},
	{
		class = "Firefox";
		instance = "NULL";
		title = "NULL";
		tag-mask = 256; # Same as `1 << 8` in C
		floating = 1;
		monitor = -1;
	}
);

#
# The keybinds are structured as follows
#	1) "modifier". This defines a modifier key that must also be
#	   pressed along with your main key. Modifiers must be separated
#	   by '+' from each other. A list of all modifiers is below. If
#	   do not wish to have a modifier key, simply put empty quotes ("").
#
#	2) "key". This is a required part of the bind, and defines the
#	   main key required to invoke the defined function. It is
#	   recommended to use a program like `xev` to find the name of
#	   the key, as they are defined by X11, not dwm. Note,
#	   capitalization is important in many cases, though dwm will
#	   try and correct for SOME of this (like with A-Z characters).
#
#	3) "function". This is the function that will be invoked when the key
#	   and modifier combination is pressed. It also determines the type of
#	   argument (if any) is required. A list of all available functions and
#	   their argument types is listed below.
#
#	4) "argument". This is the information that will be passed to the
#	   function (if an argument is required by that function). Make sure
#	   this value is of the correct type listed by your chosen function,
#	   else the bind could be invalidated when dwm attempts to parse it,
#	   or it could lead to logical errors.
#
#	Example keybinds:
#		 { modifier = "Alt + Shift", key = "Return", function = "spawn", argument = "st" },
#		 { modifier = "Alt", key = "Return", function = "zoom" },
#		 { modifier = "Alt + Control + Shift", key = "1", function = "toggletag", argument = "1" },
#
#
# Available modifiers (not case sensitive):
#	"shift",
#	"caps" or "capslock",
#	"ctrl" or "control",
#	"alt" or "mod1",
#	"super" or "mod4",
#	"mod2",
#	"mod3",
#	"mod5",
#
# Available functions (function name not case sensitive):
#
#	focusmon               // Integer Argument ( -99 to 99 )
#	focusstack             // Integer Argument ( -99 to 99 )
#	incnmaster             // Integer Argument ( -99 to 99 )
#	killclient             // No Argument
#	movemouse              // No Argument
#	quit                   // No Argument
#	resizemouse            // No Argument
#	setlayout-tiled        // No Argument
#	setlayout-floating     // No Argument
#	setlayout-monocle      // No Argument
#	setlayout-toggle       // No Argument
#	setmfact               // Float Argument ( -0.95 to 1.95 (values over 1 set mfact absolutely))
#	spawn                  // String Argument
#	tag                    // Integer Argument ( -1 to 2^9 (assuming 9 tags) )
#	tagmon                 // Integer Argument ( -99 to 99 )
#	togglebar              // No Argument
#	togglefloating         // No Argument
#	toggletag              // Integer Argument ( -1 to 2^9 (assuming 9 tags) )
#	toggleview             // Integer Argument ( -1 to 2^9 (assuming 9 tags) )
#	view                   // Integer Argument ( -1 to 2^9 (assuming 9 tags) )
#	zoom                   // No Argument
#

keybinds = (

	# Misc
	{ modifier = "Alt", key = "P", function = "spawn", argument = "dmenu_run -fn dmenu_run -fn monospace:size=10 -nb \"#222222\" -nf \"#bbbbbb\" -sb \"#005577\" -sf \"#eeeeee\"" },
	{ modifier = "Alt + Shift", key = "Return", function = "spawn", argument = "st" },
	{ modifier = "Alt", key = "B", function = "togglebar" },
	{ modifier = "Alt", key = "J", function = "focusstack", argument = +1 },
	{ modifier = "Alt", key = "K", function = "focusstack", argument = -1 },
	{ modifier = "Alt", key = "I", function = "incnmaster", argument = +1 },
	{ modifier = "Alt", key = "D", function = "incnmaster", argument = -1 },
	{ modifier = "Alt", key = "H", function = "setmfact", argument = -0.05 },
	{ modifier = "Alt", key = "L", function = "setmfact", argument = +0.05 },
	{ modifier = "Alt", key = "Return", function = "zoom" },
	{ modifier = "Alt", key = "Tab", function = "view", argument = 0 },
	{ modifier = "Alt + Shift", key = "C", function = "killclient" },
	{ modifier = "Alt", key = "t", function = "setlayout-tiled" },
	{ modifier = "Alt", key = "f", function = "setlayout-floating" },
	{ modifier = "Alt", key = "m", function = "setlayout-monocle" },
	{ modifier = "Alt", key = "space", function = "setlayout-toggle" },
	{ modifier = "Alt + Shift", key = "space", function = "togglefloating" },
	{ modifier = "Alt", key = "comma", function = "focusmon", argument = -1 },
	{ modifier = "Alt", key = "period", function = "focusmon", argument = +1 },
	{ modifier = "Alt + Shift", key = "comma", function = "tagmon", argument = -1 },
	{ modifier = "Alt + Shift", key = "period", function = "tagmon", argument = +1 },
	{ modifier = "Alt + Shift", key = "Q", function = "quit" },

	# Tags
	{ modifier = "Alt", key = "1", function = "view", argument = 1 },
	{ modifier = "Alt + Control", key = "1", function = "toggleview", argument = 1 },
	{ modifier = "Alt + Shift", key = "1", function = "tag", argument = 1 },
	{ modifier = "Alt + Control + Shift", key = "1", function = "toggletag", argument = 1 },

	{ modifier = "Alt", key = "2", function = "view", argument = 2 },
	{ modifier = "Alt + Control", key = "2", function = "toggleview", argument = 2 },
	{ modifier = "Alt + Shift", key = "2", function = "tag", argument = 2 },
	{ modifier = "Alt + Control + Shift", key = "2", function = "toggletag", argument = 2 },

	{ modifier = "Alt", key = "3", function = "view", argument = 4 },
	{ modifier = "Alt + Control", key = "3", function = "toggleview", argument = 4 },
	{ modifier = "Alt + Shift", key = "3", function = "tag", argument = 4 },
	{ modifier = "Alt + Control + Shift", key = "3", function = "toggletag", argument = 4 },

	{ modifier = "Alt", key = "4", function = "view", argument = 8 },
	{ modifier = "Alt + Control", key = "4", function = "toggleview", argument = 8 },
	{ modifier = "Alt + Shift", key = "4", function = "tag", argument = 8 },
	{ modifier = "Alt + Control + Shift", key = "4", function = "toggletag", argument = 8 },

	{ modifier = "Alt", key = "5", function = "view", argument = 16 },
	{ modifier = "Alt + Control", key = "5", function = "toggleview", argument = 16 },
	{ modifier = "Alt + Shift", key = "5", function = "tag", argument = 16 },
	{ modifier = "Alt + Control + Shift", key = "5", function = "toggletag", argument = 16 },

	{ modifier = "Alt", key = "6", function = "view", argument = 32 },
	{ modifier = "Alt + Control", key = "6", function = "toggleview", argument = 32 },
	{ modifier = "Alt + Shift", key = "6", function = "tag", argument = 32 },
	{ modifier = "Alt + Control + Shift", key = "6", function = "toggletag", argument = 32 },

	{ modifier = "Alt", key = "7", function = "view", argument = 64 },
	{ modifier = "Alt + Control", key = "7", function = "toggleview", argument = 64 },
	{ modifier = "Alt + Shift", key = "7", function = "tag", argument = 64 },
	{ modifier = "Alt + Control + Shift", key = "7", function = "toggletag", argument = 64 },

	{ modifier = "Alt", key = "8", function = "view", argument = 128 },
	{ modifier = "Alt + Control", key = "8", function = "toggleview", argument = 128 },
	{ modifier = "Alt + Shift", key = "8", function = "tag", argument = 128 },
	{ modifier = "Alt + Control + Shift", key = "8", function = "toggletag", argument = 128 },

	{ modifier = "Alt", key = "9", function = "view", argument = 256 },
	{ modifier = "Alt + Control", key = "9", function = "toggleview", argument = 256 },
	{ modifier = "Alt + Shift", key = "9", function = "tag", argument = 256 },
	{ modifier = "Alt + Control + Shift", key = "9", function = "toggletag", argument = 256 },

	{ modifier = "Alt", key = "0", function = "view", argument = -1 },
	{ modifier = "Alt + Shift", key = "0", function = "tag", argument = -1 },
);

#
# Buttonbinds follow a very similar structure to the above keybinds.
# Read how the keybinds work before reading the below, it is necessary context.
#
# Buttonbinds only differ in 2 ways.
#	1) "key" has been replaced by "button". It should contain
#	   one of the below available buttons or a number 1-255.
#	   A tool like xev is recommended.
#
#	2) new "click" element. This defines what you cursor must
#	   be hovering over when you press the modifier(s) and button
#	   for the function to be invoked. See the below list for all
#	   available clickable elements.
#
# Example formats:
#	{ modifier = "Shift", button = "Middleclick", click = "Status", function = "spawn", argument = "st" }
#	{ modifier = "", button = "Leftclick",  click = "Tag", function = "view", argument = "0" }
#	{ modifier = "", button = "Middleclick", click = "Title", function = "zoom" }
#
# Available Buttons (not case sensitive):
#	"leftclick" or "left-click",
#	"middleclick" or "middle-click",
#	"rightclick" or "right-click",
#	"scrollup" or "scroll-up",
#	"scrolldown" or "scroll-down",
#
#	Or any integer 1-255. Use xev to see what you need.
#
# Available Clickable Elements (not case sensitive):
#	"tag",
#	"layout",
#	"status",
#	"title",
#	"client",
#	"desktop",
#

buttonbinds = (
	{ modifier = "", button = "Leftclick",  click = "Layout", function = "setlayout-toggle" },
	{ modifier = "", button = "Rightclick", click = "Layout", function = "setlayout-monocle" },
	{ modifier = "", button = "Middleclick", click = "Title", function = "zoom" },
	{ modifier = "", button = "Middleclick", click = "Status", function = "spawn", argument = "st" },

	{ modifier = "Alt", button = "Leftclick",  click = "Client", function = "movemouse" },
	{ modifier = "Alt", button = "Middleclick", click = "Client", function = "togglefloating" },
	{ modifier = "Alt", button = "Rightclick", click = "Client", function = "resizemouse" },

	{ modifier = "", button = "Leftclick",  click = "Tag", function = "view", argument = 0 },
	{ modifier = "", button = "Rightclick", click = "Tag", function = "toggleview", argument = 0 },

	{ modifier = "Alt", button = "Leftclick",  click = "Tag", function = "tag", argument = 0 },
	{ modifier = "Alt", button = "Rightclick", click = "Tag", function = "toggletag", argument = 0 }
);

#
# "tags" defines a list of tag names to use. These are
# displayed in the bar. Each string is a UTF-8 string, so
# as long as your chosen font supports them, emoji or icons
# are valid. You can have up to as many tags as are defined
# in `config.(def.).h`, any more will not be used. You can
# also have less tags than are defined in `config.(def.).h`.
# dwm will fall back on the names in `config.(def.).h` for
# the remaining tags not named here.
#
tags = (
	"1",
	"2",
	"3",
	"4",
	"5",
	"6",
	"7",
	"8",
	"9"
);

################################
##          General           ##
################################

# Determines if dwm's bar is shown by default on a a
# monitor. This setting does not effect the bars ability
# to be toggled using the bind function "togglebar".
#
# Type: Boolean, Default: true
showbar = true;

# Determines the position of dwm's bar on a monitor.
#
# Type: Boolean, Default: true
topbar = true;

# Determines if dwm will respect a tiled client's size
# hints properties. Floating client are unaffected by
# this setting.
#
# Type: Boolean, Default: true
resizehints = true;

# Determines if dwm will allow another client to take
# focus from a currently fullscreen client.
#
# Type: Boolean, Default: true
lockfullscreen = true;

# Pixel width of the border trim around clients.
#
# Type: Unsigned Integer, Default: 1, Min: 0, Max: 9999
borderpx = 1;

# Determines the pixel distance before a client can "snap"
# or "dock" against another client or monitor edge, and how
# far the mouse must move to "snap" a tiled client out of
# its layout to become floating.
#
# Type: Unsigned Integer, Default: 32, Min: 0, Max: 9999
snap = 32;

# Number of clients that can be present in the master area
# of the monitor in any given layout.
#
# Type: Unsigned Integer, Default: 1, Min: 0, Max: 99
nmaster = 1;

# Determines how many times per second dwm will process
# your mouse movements while moving or resizing a client.
# Increasing this value will reduce the interval between
# mouse position updates, improving smoothness, at the
# cost of more processing power.
#
# Type: Unsigned Integer, Default: 120, Min: 0, Max: 999
refreshrate = 120;

# Determines the portion of the monitor reserved for the
# master area. It can be thought of as a percentage of
# the screen. For example, 0.55 would mean 55% of the
# screen is dedicated to the master area.
#
# Type: Float, Default: 0.55, Min: 0.05, Max: 0.95
mfact = 0.55;
